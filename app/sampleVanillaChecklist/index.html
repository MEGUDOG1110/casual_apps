<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="build-mode" content="readable-inline" />
    <title>Sample Vanilla Checklist</title>
    <link rel="stylesheet" href="./style.css" />
    <script type="module" src="./main.ts"></script>
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Vanilla Sample</p>
          <h1>Simple Checklist</h1>
          <p class="hero-copy">
            React を使わずに、追加・完了切替・絞り込みだけを持つ小さな業務メモを実装した例です。
          </p>
        </div>
        <div class="hero-note">readable-inline</div>
      </header>

      <section class="board">
        <form id="task-form" class="composer">
          <label class="composer-label" for="task-input">やることを追加</label>
          <div class="composer-row">
            <input
              id="task-input"
              class="composer-input"
              type="text"
              placeholder="例: 見積書を送る"
            />
            <button class="primary-button" type="submit">追加</button>
          </div>
        </form>

        <div class="toolbar">
          <div class="filter-group" role="tablist" aria-label="絞り込み">
            <button class="filter-button is-active" type="button" data-filter="all">すべて</button>
            <button class="filter-button" type="button" data-filter="open">未完了</button>
            <button class="filter-button" type="button" data-filter="done">完了</button>
          </div>
          <p id="summary" class="summary"></p>
        </div>

        <ul id="task-list" class="task-list"></ul>
      </section>
    </main>
  </body>
</html>
